name: Update 500 JC data

on:
  schedule:
    - cron: "15 0,6,10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-500-jc-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh current matches and recent results
        run: python tools/update_daily_data.py --history-days 10 --history-retention 400

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/matches.json data/jc_history.json data/analysis_archive.json; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "football-ai-data-bot"
          git config user.email "football-ai-data-bot@users.noreply.github.com"
          git add data/matches.json data/jc_history.json data/analysis_archive.json
          git commit -m "data: refresh 500 JC matches"
          git push
